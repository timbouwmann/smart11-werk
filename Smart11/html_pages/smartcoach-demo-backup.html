function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.05, rootMargin: '0px 0px 100px 0px' });
    obs.observe(el);
    // Fallback: trigger after 800ms in case IntersectionObserver doesn't fire
    const timer = setTimeout(() => { el.classList.add('visible'); }, 800);
    return () => { obs.disconnect(); clearTimeout(timer); };
  }, []);
  return ref;
}

          <p className="text-white/10 text-xs mt-1">Gebaseerd op herkenbare wedstrijdsituaties</p>
        </div>
        {/* Field lines decoration */}

        </div>
      </div>

      {/* Situation */}
      <div className="px-6 mb-6">
        <div className="bg-surface-2 border border-border rounded-xl p-5">
          <p className="text-xs font-semibold text-white/30 uppercase tracking-widest mb-2">Situatie</p>
          <p className="text-white/80 leading-relaxed text-base">{moment.situation}</p>
        </div>

      {/* Question */}
      <div className="px-6 mb-4">
        <p className="text-sm font-semibold text-white/50 uppercase tracking-widest mb-3">

            if (selected === opt.id) {
              cls += revealed && opt.correct ? ' border-gold bg-gold/10' : revealed ? ' border-red-500/40 bg-red-500/5' : ' selected';

                  <div className={`mt-0.5 w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center text-xs font-bold

    setAnswers(prev => [...prev, opt]);

    if (currentMoment < MOMENTS.length - 1) {
      setCurrentMoment(prev => prev + 1);
      setTimeout(() => ref.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    } else {
      onComplete();
    }
  }

  return (
    <section ref={ref} className="py-12 px-6 scroll-mt-8">
      <div className="max-w-2xl mx-auto">
        <div className="text-center mb-8">

          onNext={handleNext}
          isLast={currentMoment === MOMENTS.length - 1}
        />
      </div>
    </section>
  );
}

function Nav({ phase, onReset }) {
  return (
    <nav className="fixed top-0 left-0 right-0 z-50 border-b border-border bg-dark/90 backdrop-blur-sm">

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [phase, setPhase] = useState('landing'); // 'landing' | 'demo' | 'results'
  const demoRef = useRef(null);

  function handleStart() {
    setPhase('demo');
    setTimeout(() => {
      demoRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  function handleComplete() {
    setPhase('results');
  }

  function handleReset() {
    setPhase('landing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  return (
    <div className="min-h-screen bg-dark">
      <Nav phase={phase} onReset={handleReset} />

      <div className="pt-14">
        {phase === 'landing' && (
          <>
            <HeroSection onStart={handleStart} />
            <ProblemSection />
            {/* Demo teaser */}
            <section className="py-16 px-6 bg-surface border-y border-border">
              <div className="max-w-3xl mx-auto text-center">
                <h2 className="text-2xl sm:text-3xl font-black tracking-tight mb-4">
                  Ervaar het zelf — in 2 minuten
                </h2>
                <p className="text-white/40 mb-8 text-base leading-relaxed">
                  Drie wedstrijdmomenten. Eén vraag per moment. Directe output:
                  trainingsfocuspunten, concrete oefeningen en een teamafspraak.
                </p>
                <button onClick={handleStart} className="btn-primary bg-gold text-dark font-bold text-base px-8 py-4 rounded-xl">
                  Start de demo →
                </button>
                <p className="text-white/20 text-sm mt-3">Geen account. Geen gedoe.</p>
              </div>
            </section>
          </>
        )}

        <div ref={demoRef}>
          {phase === 'demo' && (
            <DemoSection onComplete={handleComplete} />
          )}
        </div>

        {phase === 'results' && (
          <>
            <ResultsSection />
            <SmartCoachSection />
            <FinalCTA />
          </>
        )}

        {phase === 'landing' && (
          <>
            <SmartCoachSection />
            <FinalCTA />
          </>
        )}
      </div>

      <Footer />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
