<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart11 – Analyse Widget Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'DM Sans', sans-serif; background: #0b1120; }

    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn    { from { opacity: 0; transform: scale(.94) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .anim-fadein  { animation: fadeIn  .2s ease-out both; }
    .anim-popin   { animation: popIn   .32s cubic-bezier(.34,1.45,.64,1) both; }
    .anim-slideup { animation: slideUp .26s ease-out both; }

    .scroll-inner::-webkit-scrollbar { width: 4px; }
    .scroll-inner::-webkit-scrollbar-track { background: transparent; }
    .scroll-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }

    .amber-topline::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(245,158,11,.7), transparent);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ====================================================================
       MOCK DATA
    ==================================================================== */

    const DEMO_MOMENTS = [
      {
        id: 0,
        step: '1 van 3',
        badge: 'Opbouwfase',
        title: 'Centrale verdediger met bal en weinig druk',
        desc: 'De CV heeft ruim de tijd. Het middenveld staat vrijwel vrij. Toch kiest hij niet voor de meest logische optie.',
        question: 'Wat is hier het hoofdprobleem?',
        options: [
          { id: 'a', label: 'Verkeerde keuze — dribbelen in plaats van de vrije middenvelder aanspelen' },
          { id: 'b', label: 'Middenvelders niet aanspeelbaar, slecht gepositioneerd tussen de linies' },
          { id: 'c', label: 'Handelingssnelheid te laag — te lang wachten met beslissen' },
        ]
      },
      {
        id: 1,
        step: '2 van 3',
        badge: 'Inspeelmoment',
        title: 'Vrije middenvelder wordt te laat gevonden',
        desc: 'Er is een duidelijke vrije man tussen de linies. De bal gaat alsnog lang of terug. Het moment is al voorbij.',
        question: 'Wat is hier het hoofdprobleem?',
        options: [
          { id: 'a', label: 'Scanning te laat — CV heeft de vrije man niet gezien voor hij de bal krijgt' },
          { id: 'b', label: 'Positionering MV onvoldoende — hij staat niet echt vrij, maar half gedekt' },
          { id: 'c', label: 'Passmoment gemist — juiste keuze, maar uitvoering te traag' },
        ]
      },
      {
        id: 2,
        step: '3 van 3',
        badge: 'Opbouw stokt',
        title: 'Opbouw stokt terwijl er ruimte voor ligt',
        desc: 'De bal rolt breed terwijl de tegenstander hoog staat en er vrije ruimte voor is. Het team kiest voor circulatie in plaats van progressie.',
        question: 'Wat is hier het hoofdprobleem?',
        options: [
          { id: 'a', label: 'Te veel horizontaal circuleren — geen verticale passing geprobeerd' },
          { id: 'b', label: 'Middenvelders tonen zich onvoldoende — geen aanbiedmoment gecreëerd' },
          { id: 'c', label: 'Aanvaller loopt niet de diepte in — geen dreiging achter de linie' },
        ]
      },
    ];

    const RESULT = {
      focus: [
        'Centrale verdedigers kiezen te vaak voor dribbelen of horizontale bal terwijl een vrije middenvelder inspeelbaar is.',
        'Middenvelders positioneren zich niet actief genoeg tussen de linies — ze wachten in plaats van ruimte te zoeken.',
      ],
      exercises: [
        {
          name: 'Oefening 1',
          title: '6v4 opbouwvorm',
          points: [
            'Halve speelhelft',
            'Start bij centrale verdediger',
            'Vertraagde druk vanuit de tegenstander',
            'Focus: keuze — indribbelen of de vrije man inspelen',
          ]
        },
        {
          name: 'Oefening 2',
          title: '4v4 + 3 neutraal',
          points: [
            'Veld van 25x20 meter',
            'Punt bij inspelen tussen de linies',
            'Dribbelen alleen toegestaan als er geen inspeeloptie is',
          ]
        },
      ],
      agreement: '"Zie je een vrije man tussen de linies? Dan gaat de bal — niet dribbelen."',
    };

    /* ====================================================================
       ICONS (inline SVG)
    ==================================================================== */

    const IcoClose = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    );

    const IcoArrow = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    );

    const IcoCheck = ({ size = 10 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    );

    const IcoTarget = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
    );

    const IcoDumbbell = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14.4 14.4 9.6 9.6"/><path d="M18.657 5.343a4 4 0 0 1 0 5.657l-1.414 1.414a4 4 0 0 1-5.657-5.657l1.414-1.414a4 4 0 0 1 5.657 0z"/><path d="m21.5 21.5-1.4-1.4"/><path d="M3.4 3.4 2 2"/><path d="M6.343 18.657a4 4 0 0 1-5.657-5.657l1.414-1.414a4 4 0 0 1 5.657 5.657l-1.414 1.414z"/><path d="m2.5 21.5 1.4-1.4"/>
      </svg>
    );

    const IcoMessage = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    );

    const IcoBrain = () => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
        <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
      </svg>
    );

    const IcoUsers = () => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    );

    /* ====================================================================
       STEP INDICATOR
    ==================================================================== */

    function StepIndicator({ step }) {
      const steps = [
        { num: 1, label: 'Intro' },
        { num: 2, label: 'Analyse' },
        { num: 3, label: 'Resultaat' },
      ];
      return (
        <div style={{
          display: 'flex', alignItems: 'center',
          padding: '14px 20px',
          borderBottom: '1px solid rgba(255,255,255,.07)',
          flexShrink: 0,
        }}>
          {steps.map((s, i) => {
            const done   = s.num < step;
            const active = s.num === step;
            return (
              <React.Fragment key={s.num}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                  <div style={{
                    width: 24, height: 24, borderRadius: '50%',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 11,
                    transition: 'all .25s',
                    background: done || active ? '#f59e0b' : 'rgba(255,255,255,.07)',
                    color: done || active ? '#000' : 'rgba(255,255,255,.25)',
                    boxShadow: active ? '0 0 0 4px rgba(245,158,11,.18)' : 'none',
                  }}>
                    {done ? <IcoCheck size={10}/> : s.num}
                  </div>
                  <span style={{
                    fontFamily: 'DM Sans, sans-serif', fontWeight: 500, fontSize: 12,
                    transition: 'color .25s',
                    color: active ? '#fff' : done ? 'rgba(245,158,11,.6)' : 'rgba(255,255,255,.2)',
                  }}>
                    {s.label}
                  </span>
                </div>
                {i < steps.length - 1 && (
                  <div style={{
                    flex: 1, height: 1, margin: '0 10px', transition: 'background .35s',
                    background: done ? 'rgba(245,158,11,.35)' : 'rgba(255,255,255,.08)',
                  }}/>
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    /* ====================================================================
       STEP 1 — INTRO
    ==================================================================== */

    function StepIntro({ onStart }) {
      return (
        <div className="anim-slideup" style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          textAlign: 'center', padding: '36px 28px 40px',
        }}>
          {/* Icon */}
          <div style={{
            width: 72, height: 72, borderRadius: 20, marginBottom: 24,
            background: 'rgba(245,158,11,.08)', border: '1px solid rgba(245,158,11,.2)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 0 40px rgba(245,158,11,.08)',
            fontSize: 32,
          }}>⚽</div>

          {/* Badge */}
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 7,
            background: 'rgba(245,158,11,.07)', border: '1px solid rgba(245,158,11,.18)',
            borderRadius: 999, padding: '5px 14px', marginBottom: 18,
          }}>
            <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 11, fontWeight: 600, color: '#f59e0b', letterSpacing: '.05em', textTransform: 'uppercase' }}>
              Gratis demo
            </span>
            <span style={{ width: 3, height: 3, borderRadius: '50%', background: 'rgba(245,158,11,.4)' }}/>
            <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 11, color: 'rgba(245,158,11,.6)' }}>2 minuten</span>
          </div>

          {/* Title */}
          <h2 style={{
            fontFamily: 'Syne, sans-serif', fontWeight: 800,
            fontSize: 'clamp(20px, 3.5vw, 27px)', color: '#fff',
            letterSpacing: '-.025em', lineHeight: 1.2, margin: '0 0 12px',
          }}>
            Van wedstrijdmoment<br/>naar training in 2 minuten
          </h2>

          {/* Sub */}
          <p style={{
            fontFamily: 'DM Sans, sans-serif', fontSize: 14, lineHeight: 1.7,
            color: 'rgba(255,255,255,.42)', margin: '0 0 32px', maxWidth: 320,
          }}>
            Ervaar hoe je van 3 herkenbare wedstrijdsituaties naar concrete trainingsfocus gaat.
          </p>

          {/* Buttons */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, width: '100%', maxWidth: 280 }}>
            <PrimaryButton onClick={onStart}>
              Start demo <IcoArrow/>
            </PrimaryButton>

            <div style={{ position: 'relative' }}>
              <button disabled style={{
                width: '100%', padding: '12px', borderRadius: 12,
                border: '1px solid rgba(255,255,255,.07)', background: 'transparent',
                fontFamily: 'DM Sans, sans-serif', fontSize: 13,
                color: 'rgba(255,255,255,.18)', cursor: 'not-allowed',
              }}>
                Eigen beelden gebruiken
              </button>
              <span style={{
                position: 'absolute', top: -9, right: 12,
                background: '#18243a', border: '1px solid rgba(255,255,255,.08)',
                borderRadius: 999, padding: '1px 8px',
                fontFamily: 'DM Sans, sans-serif', fontSize: 10,
                color: 'rgba(255,255,255,.3)', letterSpacing: '.03em',
              }}>
                Binnenkort beschikbaar
              </span>
            </div>
          </div>

          {/* Trust row */}
          <div style={{
            display: 'flex', alignItems: 'center', flexWrap: 'wrap',
            justifyContent: 'center', gap: 16, marginTop: 26,
          }}>
            {['Geen account nodig', 'Kost 2 minuten', 'Direct bruikbaar'].map((item, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <div style={{
                  width: 14, height: 14, borderRadius: '50%',
                  background: 'rgba(245,158,11,.1)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: 'rgba(245,158,11,.5)',
                }}>
                  <IcoCheck size={8}/>
                </div>
                <span style={{ fontFamily: 'DM Sans, sans-serif', fontSize: 11, color: 'rgba(255,255,255,.22)' }}>
                  {item}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ====================================================================
       STEP 2 — DEMO QUESTION CARDS
    ==================================================================== */

    function OptionCard({ option, selected, onClick }) {
      const [hov, setHov] = useState(false);
      return (
        <button
          onClick={onClick}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            width: '100%', textAlign: 'left',
            padding: '13px 15px', borderRadius: 12,
            cursor: 'pointer', transition: 'all .15s',
            border: `1px solid ${selected ? 'rgba(245,158,11,.55)' : hov ? 'rgba(255,255,255,.14)' : 'rgba(255,255,255,.08)'}`,
            background: selected ? 'rgba(245,158,11,.08)' : hov ? 'rgba(255,255,255,.04)' : 'rgba(255,255,255,.025)',
            boxShadow: selected ? '0 0 0 1px rgba(245,158,11,.18)' : 'none',
            display: 'flex', alignItems: 'flex-start', gap: 11,
          }}
        >
          <div style={{
            flexShrink: 0, marginTop: 2,
            width: 18, height: 18, borderRadius: '50%',
            border: `2px solid ${selected ? '#f59e0b' : 'rgba(255,255,255,.18)'}`,
            background: selected ? '#f59e0b' : 'transparent',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all .15s', color: '#000',
          }}>
            {selected && <IcoCheck size={9}/>}
          </div>
          <span style={{
            fontFamily: 'DM Sans, sans-serif', fontSize: 13, lineHeight: 1.55,
            color: selected ? '#fff' : 'rgba(255,255,255,.5)', transition: 'color .15s',
          }}>
            {option.label}
          </span>
        </button>
      );
    }

    function DemoQuestionCard({ moment, onNext, isLast }) {
      const [selected, setSelected] = useState(null);
      const [fading, setFading] = useState(false);

      function handleNext() {
        if (!selected) return;
        setFading(true);
        setTimeout(() => onNext(selected), 200);
      }

      return (
        <div style={{ opacity: fading ? 0 : 1, transition: 'opacity .2s' }}>
          {/* Sub-progress dots */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
            <div style={{ display: 'flex', gap: 5 }}>
              {DEMO_MOMENTS.map((_, i) => (
                <div key={i} style={{
                  height: 3, borderRadius: 2, transition: 'all .3s',
                  width: i <= moment.id ? 24 : 12,
                  background: i <= moment.id ? '#f59e0b' : 'rgba(255,255,255,.1)',
                }}/>
              ))}
            </div>
            <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 11, color: 'rgba(255,255,255,.28)' }}>
              {moment.step}
            </span>
          </div>

          {/* Phase badge */}
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            background: 'rgba(255,255,255,.04)', border: '1px solid rgba(255,255,255,.08)',
            borderRadius: 999, padding: '4px 11px', marginBottom: 12,
          }}>
            <div style={{ width: 5, height: 5, borderRadius: '50%', background: '#f59e0b' }}/>
            <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 10, color: 'rgba(255,255,255,.4)', textTransform: 'uppercase', letterSpacing: '.06em' }}>
              {moment.badge}
            </span>
          </div>

          {/* Situation */}
          <div style={{
            background: 'rgba(255,255,255,.025)', border: '1px solid rgba(255,255,255,.07)',
            borderRadius: 13, padding: '14px 16px', marginBottom: 16,
          }}>
            <p style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 10, color: 'rgba(255,255,255,.28)', textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 6 }}>
              Situatie
            </p>
            <h3 style={{ fontFamily: 'Syne,sans-serif', fontWeight: 700, fontSize: 15, color: '#fff', letterSpacing: '-.015em', lineHeight: 1.3, margin: '0 0 6px' }}>
              {moment.title}
            </h3>
            <p style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 13, color: 'rgba(255,255,255,.4)', margin: 0, lineHeight: 1.6 }}>
              {moment.desc}
            </p>
          </div>

          {/* Question */}
          <p style={{ fontFamily: 'DM Sans,sans-serif', fontWeight: 600, fontSize: 13, color: 'rgba(255,255,255,.7)', marginBottom: 10 }}>
            {moment.question}
          </p>

          {/* Options */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20 }}>
            {moment.options.map(opt => (
              <OptionCard
                key={opt.id}
                option={opt}
                selected={selected === opt.id}
                onClick={() => setSelected(opt.id)}
              />
            ))}
          </div>

          {/* Next */}
          <PrimaryButton onClick={handleNext} disabled={!selected}>
            {isLast ? 'Bekijk resultaat' : 'Volgende'} <IcoArrow/>
          </PrimaryButton>
        </div>
      );
    }

    function StepDemo({ onComplete }) {
      const [index, setIndex] = useState(0);
      const [answers, setAnswers] = useState([]);

      function handleNext(selected) {
        const newAnswers = [...answers, { momentId: DEMO_MOMENTS[index].id, selected }];
        if (index < DEMO_MOMENTS.length - 1) {
          setAnswers(newAnswers);
          setIndex(index + 1);
        } else {
          onComplete(newAnswers);
        }
      }

      return (
        <div key={index} className="anim-slideup" style={{ padding: '20px 20px 24px' }}>
          <DemoQuestionCard
            moment={DEMO_MOMENTS[index]}
            onNext={handleNext}
            isLast={index === DEMO_MOMENTS.length - 1}
          />
        </div>
      );
    }

    /* ====================================================================
       STEP 3 — RESULT
    ==================================================================== */

    function ResultSection({ icon, label, children }) {
      return (
        <div style={{
          borderRadius: 13, padding: '14px 16px', marginBottom: 10,
          border: '1px solid rgba(255,255,255,.07)', background: 'rgba(255,255,255,.025)',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <div style={{
              width: 28, height: 28, borderRadius: 8,
              background: 'rgba(245,158,11,.1)', border: '1px solid rgba(245,158,11,.2)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#f59e0b', flexShrink: 0,
            }}>
              {icon}
            </div>
            <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.07em', color: '#f59e0b' }}>
              {label}
            </span>
          </div>
          {children}
        </div>
      );
    }

    function ProductChoiceCard({ icon: Icon, title, forLabel, desc, bullets, cta, primary }) {
      const [hov, setHov] = useState(false);
      return (
        <div style={{
          flex: '1 1 200px', minWidth: 0,
          borderRadius: 16, padding: '18px',
          border: `1px solid ${primary ? 'rgba(245,158,11,.35)' : 'rgba(255,255,255,.08)'}`,
          background: primary ? 'rgba(245,158,11,.06)' : 'rgba(255,255,255,.025)',
          boxShadow: primary ? '0 0 30px rgba(245,158,11,.07)' : 'none',
          display: 'flex', flexDirection: 'column', gap: 14,
        }}>
          {/* Header */}
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
              <div style={{
                width: 40, height: 40, borderRadius: 12,
                background: primary ? 'rgba(245,158,11,.18)' : 'rgba(255,255,255,.08)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: primary ? '#f59e0b' : 'rgba(255,255,255,.5)',
              }}>
                <Icon/>
              </div>
              <div>
                <div style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.06em', color: primary ? 'rgba(245,158,11,.7)' : 'rgba(255,255,255,.3)', marginBottom: 2 }}>
                  {forLabel}
                </div>
                <div style={{ fontFamily: 'Syne,sans-serif', fontWeight: 700, fontSize: 15, color: '#fff', letterSpacing: '-.01em' }}>
                  {title}
                </div>
              </div>
            </div>
            <p style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 13, color: 'rgba(255,255,255,.45)', lineHeight: 1.6, margin: 0 }}>
              {desc}
            </p>
          </div>

          {/* Bullets */}
          <ul style={{ listStyle: 'none', margin: 0, padding: 0, display: 'flex', flexDirection: 'column', gap: 7 }}>
            {bullets.map((b, i) => (
              <li key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
                <div style={{
                  flexShrink: 0, marginTop: 2,
                  width: 14, height: 14, borderRadius: '50%',
                  background: primary ? 'rgba(245,158,11,.15)' : 'rgba(255,255,255,.06)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: primary ? '#f59e0b' : 'rgba(255,255,255,.3)',
                }}>
                  <IcoCheck size={8}/>
                </div>
                <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 12, color: 'rgba(255,255,255,.5)', lineHeight: 1.5 }}>
                  {b}
                </span>
              </li>
            ))}
          </ul>

          {/* CTA */}
          <button
            onMouseEnter={() => setHov(true)}
            onMouseLeave={() => setHov(false)}
            style={{
              width: '100%', padding: '11px 16px', borderRadius: 11,
              fontFamily: 'Syne,sans-serif', fontWeight: 600, fontSize: 13,
              cursor: 'pointer', transition: 'all .15s',
              border: primary ? 'none' : '1px solid rgba(255,255,255,.13)',
              background: primary ? (hov ? '#fbbf24' : '#f59e0b') : (hov ? 'rgba(255,255,255,.08)' : 'rgba(255,255,255,.04)'),
              color: primary ? '#000' : (hov ? '#fff' : 'rgba(255,255,255,.55)'),
              boxShadow: primary ? '0 4px 18px rgba(245,158,11,.22)' : 'none',
              transform: hov && primary ? 'scale(1.01)' : 'scale(1)',
            }}
          >
            {cta}
          </button>
        </div>
      );
    }

    function StepResult() {
      return (
        <div className="anim-slideup" style={{ padding: '20px 20px 32px' }}>

          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
            <div style={{
              width: 36, height: 36, borderRadius: 10,
              background: 'rgba(245,158,11,.12)', border: '1px solid rgba(245,158,11,.22)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18,
            }}>✅</div>
            <div>
              <h3 style={{ fontFamily: 'Syne,sans-serif', fontWeight: 800, fontSize: 17, color: '#fff', letterSpacing: '-.02em', margin: 0 }}>
                Jouw trainingsfocus
              </h3>
              <p style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 11, color: 'rgba(255,255,255,.32)', margin: 0 }}>
                Op basis van 3 wedstrijdmomenten
              </p>
            </div>
          </div>

          {/* Focus */}
          <ResultSection icon={<IcoTarget/>} label="Trainingsfocus">
            <ol style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 10 }}>
              {RESULT.focus.map((f, i) => (
                <li key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                  <div style={{
                    flexShrink: 0, marginTop: 1,
                    width: 18, height: 18, borderRadius: '50%',
                    background: 'rgba(245,158,11,.16)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontFamily: 'Syne,sans-serif', fontWeight: 700, fontSize: 9, color: '#f59e0b',
                  }}>{i + 1}</div>
                  <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 13, color: 'rgba(255,255,255,.78)', lineHeight: 1.55 }}>{f}</span>
                </li>
              ))}
            </ol>
          </ResultSection>

          {/* Exercises */}
          {RESULT.exercises.map((ex, i) => (
            <ResultSection key={i} icon={<IcoDumbbell/>} label={ex.name}>
              <p style={{ fontFamily: 'Syne,sans-serif', fontWeight: 700, fontSize: 14, color: '#fff', margin: '0 0 8px', letterSpacing: '-.01em' }}>
                {ex.title}
              </p>
              <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 6 }}>
                {ex.points.map((p, j) => (
                  <li key={j} style={{ display: 'flex', gap: 8, fontFamily: 'DM Sans,sans-serif', fontSize: 13, color: 'rgba(255,255,255,.5)', lineHeight: 1.5 }}>
                    <span style={{ color: 'rgba(245,158,11,.5)', flexShrink: 0 }}>—</span>
                    {p}
                  </li>
                ))}
              </ul>
            </ResultSection>
          ))}

          {/* Team agreement */}
          <ResultSection icon={<IcoMessage/>} label="Teamafspraak">
            <p style={{ fontFamily: 'DM Sans,sans-serif', fontWeight: 500, fontSize: 14, color: '#fff', lineHeight: 1.65, margin: 0 }}>
              {RESULT.agreement}
            </p>
          </ResultSection>

          {/* Product bridge */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 12, margin: '22px 0 14px',
          }}>
            <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,.07)' }}/>
            <span style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 12, color: 'rgba(255,255,255,.25)', whiteSpace: 'nowrap' }}>
              Wil je dit elke week toepassen?
            </span>
            <div style={{ flex: 1, height: 1, background: 'rgba(255,255,255,.07)' }}/>
          </div>

          <p style={{ fontFamily: 'DM Sans,sans-serif', fontSize: 14, color: 'rgba(255,255,255,.38)', textAlign: 'center', lineHeight: 1.65, margin: '0 0 16px' }}>
            Maak van losse inzichten een vast systeem dat past bij jouw manier van coachen.
          </p>

          {/* Product cards */}
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            <ProductChoiceCard
              icon={IcoBrain}
              title="SmartCoach"
              forLabel="Voor coaches"
              primary={true}
              desc="Gebruik SmartCoach als je zelf sneller en met meer structuur wilt analyseren."
              bullets={[
                'Sneller zien wat er echt misgaat',
                'Analyses op één plek bewaren',
                'Vaste structuur in elke sessie',
                'Van beeld naar coaching in minuten',
                'Minder voorbereidingstijd',
              ]}
              cta="Bekijk SmartCoach"
            />
            <ProductChoiceCard
              icon={IcoUsers}
              title="Smart11 BASE"
              forLabel="Voor spelers & coach"
              primary={false}
              desc="Gebruik Smart11 BASE als je spelers meer zelf wilt laten nadenken en eigenaarschap wilt geven."
              bullets={[
                'Spelers analyseren actief mee',
                'Meer eigenaarschap in ontwikkeling',
                'Minder zenden in de nabespreking',
                'Betere voorbereiding op gesprekken',
                'Ontwikkeling wordt een gedeeld proces',
              ]}
              cta="Bekijk Smart11 BASE"
            />
          </div>
        </div>
      );
    }

    /* ====================================================================
       PRIMARY BUTTON
    ==================================================================== */

    function PrimaryButton({ onClick, disabled, children }) {
      const [hov, setHov] = useState(false);
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          onMouseDown={e => { if (!disabled) e.currentTarget.style.transform = 'scale(.98)'; }}
          onMouseUp={e => { if (!disabled) e.currentTarget.style.transform = hov ? 'scale(1.01)' : 'scale(1)'; }}
          style={{
            width: '100%', padding: '14px 20px', borderRadius: 13, border: 'none',
            fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 14,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            cursor: disabled ? 'not-allowed' : 'pointer', transition: 'all .15s',
            background: disabled ? 'rgba(255,255,255,.05)' : hov ? '#fbbf24' : '#f59e0b',
            color: disabled ? 'rgba(255,255,255,.18)' : '#000',
            boxShadow: disabled ? 'none' : hov ? '0 6px 28px rgba(245,158,11,.35)' : '0 4px 20px rgba(245,158,11,.25)',
            transform: hov && !disabled ? 'scale(1.01)' : 'scale(1)',
          }}
        >
          {children}
        </button>
      );
    }

    /* ====================================================================
       MODAL SHELL
    ==================================================================== */

    function ModalShell({ onClose, children, step }) {
      return (
        <div
          className="anim-fadein"
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}
          style={{
            position: 'fixed', inset: 0, zIndex: 9999,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: 16,
            background: 'rgba(0,0,0,.78)',
            backdropFilter: 'blur(12px)',
          }}
        >
          <div
            className="anim-popin amber-topline"
            style={{
              position: 'relative', width: '100%', maxWidth: 680,
              borderRadius: 22, overflow: 'hidden',
              display: 'flex', flexDirection: 'column',
              maxHeight: '92vh',
              background: '#0d1626',
              border: '1px solid rgba(255,255,255,.07)',
              boxShadow: '0 32px 90px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04), inset 0 1px 0 rgba(255,255,255,.07)',
            }}
          >
            {/* Modal top bar */}
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '16px 18px 0', flexShrink: 0,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                <div style={{ width: 26, height: 26, borderRadius: 7, background: 'rgba(245,158,11,.14)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13 }}>
                  ⚡
                </div>
                <span style={{ fontFamily: 'Syne,sans-serif', fontWeight: 700, fontSize: 13, color: 'rgba(255,255,255,.82)', letterSpacing: '-.01em' }}>
                  Smart11
                </span>
              </div>
              <button
                onClick={onClose}
                style={{
                  width: 30, height: 30, borderRadius: 8,
                  border: '1px solid rgba(255,255,255,.1)',
                  background: 'rgba(255,255,255,.04)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: 'rgba(255,255,255,.4)', cursor: 'pointer', transition: 'all .15s',
                }}
                onMouseEnter={e => { e.currentTarget.style.color = 'rgba(255,255,255,.8)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,.2)'; }}
                onMouseLeave={e => { e.currentTarget.style.color = 'rgba(255,255,255,.4)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,.1)'; }}
              >
                <IcoClose/>
              </button>
            </div>

            {/* Step indicator */}
            <div style={{ flexShrink: 0, marginTop: 12 }}>
              <StepIndicator step={step}/>
            </div>

            {/* Scrollable content */}
            <div className="scroll-inner" style={{ flex: 1, overflowY: 'auto' }}>
              {children}
            </div>
          </div>
        </div>
      );
    }

    /* ====================================================================
       DEMO TRIGGER BUTTON
    ==================================================================== */

    function DemoTriggerButton({ onClick }) {
      const [hov, setHov] = useState(false);
      return (
        <button
          onClick={onClick}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            padding: '14px 28px', borderRadius: 14, border: 'none',
            fontFamily: 'Syne, sans-serif', fontWeight: 700, fontSize: 15,
            display: 'flex', alignItems: 'center', gap: 9, cursor: 'pointer',
            transition: 'all .15s',
            background: hov ? '#fbbf24' : '#f59e0b',
            color: '#000',
            boxShadow: hov ? '0 8px 32px rgba(245,158,11,.45)' : '0 6px 28px rgba(245,158,11,.35)',
            transform: hov ? 'scale(1.02)' : 'scale(1)',
          }}
        >
          Start demo-analyse <IcoArrow/>
        </button>
      );
    }

    /* ====================================================================
       SMART11 ANALYSIS POPUP — main exported component
    ==================================================================== */

    function Smart11AnalysisPopup() {
      const [open, setOpen]           = useState(false);
      const [step, setStep]           = useState(1);
      const [answers, setAnswers]     = useState([]);

      // Close resets state after fade-out
      const handleClose = useCallback(() => {
        setOpen(false);
        setTimeout(() => { setStep(1); setAnswers([]); }, 300);
      }, []);

      // ESC key
      useEffect(() => {
        const handler = e => { if (e.key === 'Escape') handleClose(); };
        if (open) document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [open, handleClose]);

      function handleDemoComplete(ans) {
        setAnswers(ans);
        setStep(3);
      }

      return (
        <>
          {/* Trigger — only shown for demo purposes */}
          <DemoTriggerButton onClick={() => setOpen(true)}/>

          {/* Popup */}
          {open && (
            <ModalShell onClose={handleClose} step={step}>
              {step === 1 && (
                <StepIntro onStart={() => setStep(2)}/>
              )}
              {step === 2 && (
                <StepDemo onComplete={handleDemoComplete}/>
              )}
              {step === 3 && (
                <StepResult answers={answers}/>
              )}
            </ModalShell>
          )}
        </>
      );
    }

    /* ====================================================================
       APP — renders trigger on a minimal dark background for demo
    ==================================================================== */

    function App() {
      return (
        <div style={{
          minHeight: '100vh',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          background: 'linear-gradient(145deg, #07101f 0%, #0d1a30 60%, #07101f 100%)',
          position: 'relative', overflow: 'hidden',
          flexDirection: 'column', gap: 16,
        }}>
          {/* Subtle ambient glow */}
          <div style={{
            position: 'absolute', top: '40%', left: '50%',
            transform: 'translate(-50%, -50%)',
            width: 600, height: 400, borderRadius: '50%', pointerEvents: 'none',
            background: 'radial-gradient(ellipse, rgba(245,158,11,.03) 0%, transparent 70%)',
          }}/>

          <p style={{
            fontFamily: 'DM Sans, sans-serif', fontSize: 12,
            color: 'rgba(255,255,255,.2)', letterSpacing: '.06em', textTransform: 'uppercase',
            margin: 0,
          }}>
            Smart11 · Widget demo
          </p>

          <Smart11AnalysisPopup/>

          <p style={{
            fontFamily: 'DM Sans, sans-serif', fontSize: 11,
            color: 'rgba(255,255,255,.14)', margin: 0,
          }}>
            Klik om de popup te openen — ESC of klik buiten om te sluiten
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
