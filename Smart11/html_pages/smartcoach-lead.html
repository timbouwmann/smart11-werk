function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const timer = setTimeout(() => el.classList.add('visible'), 300);
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.05, rootMargin: '0px 0px 120px 0px' });
    obs.observe(el);
    return () => { obs.disconnect(); clearTimeout(timer); };
  }, []);
  return ref;
}

  return (
    <span className="inline-block text-xs font-semibold tracking-widest text-gold uppercase bg-gold/10 border border-gold/20 rounded px-3 py-1">

function ProgressBar({ current, total }) {
  const pct = ((current + 1) / total) * 100;
  return (
    <div className="mb-8">
      <div className="flex justify-between items-center mb-2">
        <span className="text-sm text-white/40 font-medium">Moment {current + 1} van {total}</span>
        <span className="text-sm text-gold font-semibold">{Math.round(pct)}%</span>
      </div>
      <div className="h-1.5 bg-border rounded-full overflow-hidden">
        <div className="h-full bg-gold rounded-full progress-bar-fill" style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

function MomentCard({ moment, onNext, isLast }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  function handleSelect(opt) {
    if (revealed) return;
    setSelected(opt.id);
    setRevealed(true);
  }

  return (
    <div className="bg-surface border border-border rounded-2xl overflow-hidden">
      <div className="border-b border-border px-6 py-4 flex items-center gap-3">
        <div className="w-2 h-2 rounded-full bg-gold" />
        <span className="text-sm font-semibold text-white/60">{moment.label}</span>
        <span className="ml-auto text-xs text-white/30 font-mono">{moment.tag}</span>
      </div>

      {/* Video placeholder */}
      <div className="relative bg-black/40 mx-6 my-5 rounded-xl overflow-hidden" style={{ aspectRatio: '16/7' }}>
        <div className="absolute inset-0 bg-gradient-to-br from-surface-2 to-black/60" />
        <div className="absolute inset-0 opacity-5">
          <div className="absolute left-1/2 top-0 bottom-0 w-px bg-white" />
          <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full border border-white" />
        </div>
        <div className="relative z-10 flex flex-col items-center justify-center h-full">
          <div className="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center mb-2">
            <svg className="w-6 h-6 text-white/30 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <p className="text-white/20 text-xs">Demo wedstrijdclip · {moment.tag}</p>
        </div>
      </div>

      <div className="px-6 mb-6">
        <div className="bg-surface-2 border border-border rounded-xl p-5">
          <p className="text-xs font-semibold text-white/30 uppercase tracking-widest mb-2">Situatie</p>
          <p className="text-white/80 leading-relaxed">{moment.situation}</p>
        </div>
      </div>

      <div className="px-6 mb-6">
        <p className="text-xs font-semibold text-white/40 uppercase tracking-widest mb-3">{moment.question}</p>
        <div className="flex flex-col gap-3">
          {moment.options.map(opt => {
            let cls = 'option-card w-full bg-surface-2 border border-border rounded-xl p-4 text-left';
            if (revealed) {
              if (opt.correct) cls += ' border-gold/50 bg-gold/8';
              else if (selected === opt.id) cls += ' border-red-500/30 opacity-50';
              else cls += ' opacity-30';
            } else {
              cls += ' cursor-pointer hover:border-gold/30';
              if (selected === opt.id) cls += ' selected';
            }
            return (
              <button key={opt.id} className={cls} onClick={() => handleSelect(opt)} disabled={revealed}>
                <div className="flex items-start gap-3">
                  <div className={`mt-0.5 w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center text-xs font-bold transition-colors
                    ${revealed && opt.correct ? 'border-gold bg-gold text-dark' : ''}
                    ${revealed && selected === opt.id && !opt.correct ? 'border-red-400 text-red-400' : ''}
                    ${!revealed ? 'border-white/20' : ''}
                  `}>
                    {revealed && opt.correct && '✓'}
                    {revealed && selected === opt.id && !opt.correct && '✗'}
                  </div>
                  <span className="text-sm leading-relaxed text-white/80">{opt.text}</span>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {revealed && (
        <div className="px-6 pb-6">
          <div className={`rounded-xl p-4 mb-4 text-sm text-white/70 leading-relaxed ${
            moment.options.find(o => o.id === selected)?.correct
              ? 'bg-gold/8 border border-gold/20'
              : 'bg-surface-2 border border-border'
          }`}>
            {moment.options.find(o => o.id === selected)?.correct
              ? '✓ Precies. Dit is wat we terugzien in wedstrijdbeelden. Herken je dit ook bij jouw team?'

            }

          <button onClick={onNext} className="btn-primary w-full bg-gold text-dark font-bold py-4 rounded-xl text-base">
            {isLast ? 'Bekijk mijn trainingsplan →' : 'Volgende moment →'}
          </button>
        </div>
      )}
    </div>
  );
}

function DemoSection({ onComplete }) {
  const [currentMoment, setCurrentMoment] = useState(0);
  const ref = useRef(null);

  function handleNext() {
    if (currentMoment < MOMENTS.length - 1) {
      setCurrentMoment(prev => prev + 1);
      setTimeout(() => ref.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    } else {
      onComplete();
    }
  }

  return (
    <section ref={ref} className="py-12 px-6 scroll-mt-16">
      <div className="max-w-2xl mx-auto">
        <div className="text-center mb-8">
          <Tag>Demo · Gebaseerd op herkenbare wedstrijdsituaties</Tag>
          <h2 className="text-2xl sm:text-3xl font-black tracking-tight mt-4 mb-2">Analyseer 3 wedstrijdmomenten</h2>
          <p className="text-white/40 text-sm">Direct bruikbaar voor je eerstvolgende training</p>
        </div>
        <ProgressBar current={currentMoment} total={MOMENTS.length} />
        <MomentCard key={currentMoment} moment={MOMENTS[currentMoment]} onNext={handleNext} isLast={currentMoment === MOMENTS.length - 1} />
      </div>
    </section>
  );
}

                <ul className="flex flex-col gap-2">

          </div>
        </div>

        <div className="result-card bg-surface-2 border border-gold/30 rounded-xl p-6 text-center mb-8">

        </div>

        <p className="text-center text-white/30 text-sm">
          Dit is wat je in 2 minuten haalt uit 3 wedstrijdmomenten.<br />

        </p>
      </div>
    </section>
  );
}

  const ref = useFadeIn();

        <div className="flex flex-col sm:flex-row gap-4 justify-center mb-6">
          <a href="https://smart11.ai/en/coaches/" target="_blank" rel="noopener noreferrer"
            className="btn-primary bg-gold text-dark font-bold text-base px-8 py-4 rounded-xl inline-block">
            Probeer SmartCoach 14 dagen gratis
          </a>
          <a href="https://smart11.ai/en/coaches/" target="_blank" rel="noopener noreferrer"
            className="btn-secondary border border-border text-white/60 font-medium text-base px-8 py-4 rounded-xl inline-block">
            Plan een demo

        </div>
        <p className="text-white/20 text-sm">Gebruikt door coaches bij amateurclubs door heel Nederland</p>

}

function App() {
  const [phase, setPhase] = useState('landing');
  const demoRef = useRef(null);

  function handleStart() {
    setPhase('demo');
    setTimeout(() => demoRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  function handleComplete() {
    setPhase('results');
  }

  function handleReset() {
    setPhase('landing');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  return (
    <div className="min-h-screen bg-dark">
      <Nav phase={phase} onReset={handleReset} />
      <div className="pt-14">
        {phase === 'landing' && (
          <>
            <HeroSection onStart={handleStart} />
            <ProblemSection onStart={handleStart} />
            <SmartCoachSection />
            <FinalCTA />
          </>
        )}
        <div ref={demoRef}>
          {phase === 'demo' && <DemoSection onComplete={handleComplete} />}
        </div>
        {phase === 'results' && (
          <>
            <ResultsSection />
            <SmartCoachSection />
            <FinalCTA />
          </>
        )}
      </div>
      <footer className="border-t border-border py-8 px-6 text-center">
        <p className="text-white/20 text-sm">© 2026 Smart11 · <a href="https://smart11.ai" className="hover:text-gold transition-colors">smart11.ai</a></p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
